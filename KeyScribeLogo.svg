<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="512" height="512">
    <defs>
        <!-- Black → charcoal grey radial gradient -->
        <radialGradient id="bg" cx="38%" cy="35%" r="75%">
            <stop offset="0%" stop-color="#3a3a3a" />
            <stop offset="100%" stop-color="#000000" />
        </radialGradient>

        <!-- Bar gradients: grey-white graduating to bright white -->
        <linearGradient id="b1" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#9ca3af" stop-opacity="0.5" />
            <stop offset="100%" stop-color="#4b5563" stop-opacity="0.2" />
        </linearGradient>
        <linearGradient id="b2" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#d1d5db" stop-opacity="0.65" />
            <stop offset="100%" stop-color="#6b7280" stop-opacity="0.3" />
        </linearGradient>
        <linearGradient id="b3" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#f3f4f6" stop-opacity="0.82" />
            <stop offset="100%" stop-color="#9ca3af" stop-opacity="0.4" />
        </linearGradient>
        <linearGradient id="b4" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#ffffff" />
            <stop offset="100%" stop-color="#d1d5db" stop-opacity="0.6" />
        </linearGradient>

        <!-- Text line fade gradients -->
        <linearGradient id="l1" x1="64" y1="0" x2="104" y2="0" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="white" stop-opacity="0.9" />
            <stop offset="100%" stop-color="white" stop-opacity="0" />
        </linearGradient>
        <linearGradient id="l2" x1="64" y1="0" x2="96" y2="0" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="white" stop-opacity="0.7" />
            <stop offset="100%" stop-color="white" stop-opacity="0" />
        </linearGradient>
        <linearGradient id="l3" x1="64" y1="0" x2="100" y2="0" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="white" stop-opacity="0.52" />
            <stop offset="100%" stop-color="white" stop-opacity="0" />
        </linearGradient>
        <linearGradient id="l4" x1="64" y1="0" x2="88" y2="0" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="white" stop-opacity="0.36" />
            <stop offset="100%" stop-color="white" stop-opacity="0" />
        </linearGradient>
        <linearGradient id="l5" x1="64" y1="0" x2="94" y2="0" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="white" stop-opacity="0.2" />
            <stop offset="100%" stop-color="white" stop-opacity="0" />
        </linearGradient>

        <!-- Metallic gold stroke gradient -->
        <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#E8D48B" />
            <stop offset="40%" stop-color="#C9A84C" />
            <stop offset="60%" stop-color="#F0DFA0" />
            <stop offset="100%" stop-color="#A8882A" />
        </linearGradient>


        <!-- Inner vignette -->
        <radialGradient id="vignette" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="black" stop-opacity="0" />
            <stop offset="60%" stop-color="black" stop-opacity="0" />
            <stop offset="75%" stop-color="black" stop-opacity="0.08" />
            <stop offset="85%" stop-color="black" stop-opacity="0.18" />
            <stop offset="92%" stop-color="black" stop-opacity="0.3" />
            <stop offset="100%" stop-color="black" stop-opacity="0.45" />
        </radialGradient>

        <clipPath id="clip">
            <circle cx="60" cy="60" r="58.5" />
        </clipPath>
    </defs>

    <!-- Main circle with shadow and metallic gold ring -->
    <circle cx="60" cy="60" r="58.5" fill="url(#bg)" stroke="url(#gold)" stroke-width="2.8" />

    <g clip-path="url(#clip)">
        <!-- LEFT: 5 symmetric waveform bars (centered at y=60, uniform 3.5 gaps) -->
        <rect x="16" y="50" width="5" height="20" rx="2.5" fill="url(#b1)" />
        <rect x="24.5" y="42" width="5.5" height="36" rx="2.75" fill="url(#b3)" />
        <rect x="33.5" y="34" width="6" height="52" rx="3" fill="url(#b4)" />
        <rect x="43" y="42" width="5.5" height="36" rx="2.75" fill="url(#b3)" />
        <rect x="52" y="50" width="5" height="20" rx="2.5" fill="url(#b1)" />

        <!-- Divider -->
        <line x1="59" y1="30" x2="59" y2="90" stroke="white" stroke-width="0.8" opacity="0.12" />

        <!-- AI sparkles near text lines (4-point star: top, right, bottom, left with curved indents) -->
        <path d="M99,34 C99,36.5 100.5,38 103,38 C100.5,38 99,39.5 99,42 C99,39.5 97.5,38 95,38 C97.5,38 99,36.5 99,34 Z" fill="white" opacity="0.65" />
        <path d="M94,64 C94,65.5 94.8,66.2 96.5,66.2 C94.8,66.2 94,67 94,68.5 C94,67 93.2,66.2 91.5,66.2 C93.2,66.2 94,65.5 94,64 Z" fill="white" opacity="0.4" />

        <!-- RIGHT: 5 transcription lines -->
        <rect x="64" y="40" width="40" height="4" rx="2" fill="url(#l1)" />
        <rect x="64" y="51" width="32" height="3.5" rx="1.75" fill="url(#l2)" />
        <rect x="64" y="62" width="36" height="3.5" rx="1.75" fill="url(#l3)" />
        <rect x="64" y="72" width="24" height="3" rx="1.5" fill="url(#l4)" />
        <rect x="64" y="82" width="30" height="3" rx="1.5" fill="url(#l5)" />

        <!-- Inner vignette for depth -->
        <circle cx="60" cy="60" r="56" fill="url(#vignette)" />
    </g>
</svg>