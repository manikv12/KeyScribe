appId: com.keyscribe.desktop
productName: KeyScribe
artifactName: "${productName}-${version}-${os}-${arch}.${ext}"

directories:
  output: dist
  buildResources: build

files:
  - "**/*"
  - "!**/*.map"

asar: true

extraResources:
  - from: native/bin
    to: bin
    filter:
      - "**/*"

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  category: public.app-category.productivity
  hardenedRuntime: false
  gatekeeperAssess: false
  identity: null

dmg:
  sign: false

win:
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
