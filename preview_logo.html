<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>KeyScribe Logo Preview</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            gap: 32px;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #e2e8f0;
            padding: 40px;
            flex-wrap: wrap;
        }

        .card {
            border-radius: 24px;
            padding: 48px;
            text-align: center;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
        }

        .light {
            background: #ffffff;
        }

        .dark {
            background: #1e293b;
        }

        img {
            width: 180px;
            height: 180px;
            display: block;
        }

        p {
            margin-top: 14px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 600;
            color: #94a3b8;
        }
    </style>
</head>

<body>
    <div class="card light"><img src="KeyScribeLogo.svg" />
        <p>Light</p>
    </div>
    <div class="card dark"><img src="KeyScribeLogo.svg" />
        <p>Dark</p>
    </div>
</body>

</html>
